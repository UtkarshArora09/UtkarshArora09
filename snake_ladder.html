<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>🐍 Snake & Ladder — by Utkarsh Arora</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', Tahoma, sans-serif;
    background: linear-gradient(135deg, #0D1117 0%, #1a1a2e 50%, #16213e 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 24px 16px;
    color: #eee;
  }
  h1 {
    font-size: 2.2rem;
    margin-bottom: 4px;
    background: linear-gradient(90deg, #6EE7F7, #7B2FBE);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .subtitle {
    font-size: 0.88rem;
    color: #888;
    margin-bottom: 24px;
    letter-spacing: 1px;
  }
  .container {
    display: flex;
    gap: 24px;
    align-items: flex-start;
    flex-wrap: wrap;
    justify-content: center;
    width: 100%;
    max-width: 900px;
  }
  canvas {
    border-radius: 14px;
    box-shadow: 0 0 50px #7B2FBE44, 0 0 100px #6EE7F711;
    border: 2px solid #7B2FBE55;
    max-width: 100%;
  }
  .panel {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 14px;
    padding: 20px;
    min-width: 230px;
    max-width: 290px;
    flex: 1;
  }
  .panel h2 {
    font-size: 1rem;
    color: #6EE7F7;
    margin-bottom: 14px;
    letter-spacing: 0.5px;
  }
  .player {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 12px;
    padding: 12px;
    border-radius: 10px;
    background: rgba(255,255,255,0.06);
    transition: background 0.3s;
  }
  .player.active {
    background: rgba(110,231,247,0.1);
    border: 1px solid #6EE7F733;
  }
  .player-dot {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    flex-shrink: 0;
    box-shadow: 0 0 8px currentColor;
  }
  .player-info { font-size: 0.85rem; line-height: 1.5; }
  .player-name { font-weight: bold; font-size: 0.9rem; }
  .player-pos { color: #aaa; font-size: 0.75rem; margin-top: 2px; }
  .turn-badge {
    text-align: center;
    font-size: 0.85rem;
    color: #6EE7F7;
    margin: 12px 0 4px;
    font-weight: bold;
    letter-spacing: 0.5px;
  }
  .dice-display {
    font-size: 3.5rem;
    text-align: center;
    margin: 8px 0;
    min-height: 60px;
    line-height: 1;
    filter: drop-shadow(0 0 8px #7B2FBE);
    transition: transform 0.1s;
  }
  .dice-display.rolling { animation: shake 0.08s infinite; }
  @keyframes shake {
    0%,100% { transform: rotate(0deg); }
    25% { transform: rotate(-8deg) scale(1.1); }
    75% { transform: rotate(8deg) scale(0.9); }
  }
  button {
    width: 100%;
    padding: 13px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(135deg, #6EE7F7, #7B2FBE);
    color: white;
    font-size: 1rem;
    font-weight: bold;
    cursor: pointer;
    margin-bottom: 10px;
    transition: opacity 0.2s, transform 0.1s;
    letter-spacing: 0.5px;
  }
  button:hover:not(:disabled) { opacity: 0.88; transform: translateY(-1px); }
  button:active:not(:disabled) { transform: translateY(0); }
  button:disabled { opacity: 0.35; cursor: not-allowed; }
  .btn-secondary {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
  }
  #log {
    font-size: 0.78rem;
    color: #bbb;
    max-height: 200px;
    overflow-y: auto;
    line-height: 1.9;
    scrollbar-width: thin;
    scrollbar-color: #7B2FBE #0D1117;
  }
  #log div {
    padding: 3px 4px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  #log div:first-child { color: #6EE7F7; }
  .legend {
    display: flex;
    gap: 16px;
    margin-top: 16px;
    font-size: 0.75rem;
    color: #aaa;
    flex-wrap: wrap;
  }
  .legend-item { display: flex; align-items: center; gap: 5px; }
  .legend-dot { width: 12px; height: 12px; border-radius: 2px; }
  /* Winner Modal */
  .winner-modal {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.8);
    align-items: center;
    justify-content: center;
    z-index: 99;
    animation: fadeIn 0.3s ease;
  }
  .winner-modal.show { display: flex; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .winner-box {
    background: linear-gradient(135deg, #1a1a2e, #16213e);
    border: 2px solid #7B2FBE;
    border-radius: 20px;
    padding: 48px 40px;
    text-align: center;
    box-shadow: 0 0 60px #7B2FBE66;
    animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }
  @keyframes popIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .winner-box .trophy { font-size: 4rem; margin-bottom: 12px; }
  .winner-box h2 {
    font-size: 2rem;
    background: linear-gradient(90deg,#6EE7F7,#7B2FBE);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
  }
  .winner-box p { color: #aaa; margin-bottom: 24px; font-size: 0.9rem; }
  .winner-box button { max-width: 200px; margin: 0 auto; }

  @media (max-width: 600px) {
    canvas { width: 340px !important; height: 340px !important; }
    .panel { max-width: 340px; }
    h1 { font-size: 1.6rem; }
  }
</style>
</head>
<body>

<h1>🐍 Snake &amp; Ladder</h1>
<p class="subtitle">by Utkarsh Arora · UtkarshArora09 · github.com/UtkarshArora09</p>

<div class="container">
  <div>
    <canvas id="board" width="500" height="500"></canvas>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:#FF6B6B"></div> Snake (slide down)</div>
      <div class="legend-item"><div class="legend-dot" style="background:#4ECDC4"></div> Ladder (climb up)</div>
      <div class="legend-item"><div class="legend-dot" style="background:#FF6B6B;border-radius:50%"></div> Player 1</div>
      <div class="legend-item"><div class="legend-dot" style="background:#FFD166;border-radius:50%"></div> Player 2</div>
    </div>
  </div>

  <div class="panel">
    <h2>🎮 Players</h2>

    <div class="player active" id="playerCard0">
      <div class="player-dot" style="background:#FF6B6B; color:#FF6B6B"></div>
      <div class="player-info">
        <div class="player-name">🧑 Player 1</div>
        <div class="player-pos" id="p1pos">Position: Start</div>
      </div>
    </div>

    <div class="player" id="playerCard1">
      <div class="player-dot" style="background:#FFD166; color:#FFD166"></div>
      <div class="player-info">
        <div class="player-name">🧑 Player 2</div>
        <div class="player-pos" id="p2pos">Position: Start</div>
      </div>
    </div>

    <div class="turn-badge" id="turnBadge">🎲 Player 1's Turn</div>
    <div class="dice-display" id="diceDisplay">🎲</div>

    <button id="rollBtn" onclick="rollDice()">🎲 Roll Dice</button>
    <button class="btn-secondary" onclick="resetGame()">🔄 New Game</button>

    <h2 style="margin-top:16px">📜 Log</h2>
    <div id="log"></div>
  </div>
</div>

<!-- Winner Modal -->
<div class="winner-modal" id="winnerModal">
  <div class="winner-box">
    <div class="trophy">🏆</div>
    <h2 id="winnerText">Player 1 Wins!</h2>
    <p>Reached square 100! You're unstoppable! 🚀</p>
    <button onclick="resetGame(); document.getElementById('winnerModal').classList.remove('show')">🔄 Play Again</button>
  </div>
</div>

<script>
const canvas = document.getElementById('board');
const ctx = canvas.getContext('2d');
const SIZE = 500, CELLS = 10, CELL = SIZE / CELLS;

const SNAKES = { 97:78, 95:56, 88:24, 62:19, 49:11, 36:6, 32:10, 17:7 };
const LADDERS = { 4:14, 9:31, 20:38, 28:84, 40:59, 51:67, 63:81, 71:91 };
const DICE_FACES = ['','⚀','⚁','⚂','⚃','⚄','⚅'];
const PLAYER_COLORS = ['#FF6B6B', '#FFD166'];

let players = [
  { pos: 0, color: '#FF6B6B', name: 'Player 1' },
  { pos: 0, color: '#FFD166', name: 'Player 2' }
];
let turn = 0, rolling = false, gameOver = false;

function cellToXY(cell) {
  if (cell <= 0) return { x: -999, y: -999 };
  cell = Math.min(cell, 100);
  const idx = cell - 1;
  const row = Math.floor(idx / CELLS);
  const col = idx % CELLS;
  const drawCol = (row % 2 === 0) ? col : (CELLS - 1 - col);
  const drawRow = CELLS - 1 - row;
  return {
    x: drawCol * CELL + CELL / 2,
    y: drawRow * CELL + CELL / 2
  };
}

function drawBoard() {
  const lightCell = '#1e2140';
  const darkCell = '#151830';
  const borderCol = 'rgba(255,255,255,0.06)';

  for (let r = 0; r < CELLS; r++) {
    for (let c = 0; c < CELLS; c++) {
      const row = CELLS - 1 - r;
      const colNum = (row % 2 === 0) ? c : (CELLS - 1 - c);
      const num = row * CELLS + colNum + 1;
      const px = c * CELL, py = r * CELL;

      // Cell background
      ctx.fillStyle = (r + c) % 2 === 0 ? lightCell : darkCell;
      ctx.fillRect(px, py, CELL, CELL);

      // Border
      ctx.strokeStyle = borderCol;
      ctx.lineWidth = 1;
      ctx.strokeRect(px + 0.5, py + 0.5, CELL - 1, CELL - 1);

      // Number
      ctx.fillStyle = 'rgba(255,255,255,0.25)';
      ctx.font = `bold ${CELL * 0.2}px Segoe UI`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';
      ctx.fillText(num, px + CELL / 2, py + 5);

      // Highlight start and end
      if (num === 100) {
        ctx.fillStyle = 'rgba(110,231,247,0.12)';
        ctx.fillRect(px, py, CELL, CELL);
        ctx.fillStyle = '#6EE7F7';
        ctx.font = `${CELL * 0.36}px serif`;
        ctx.fillText('🏆', px + CELL / 2, py + CELL * 0.35);
      }
      if (num === 1) {
        ctx.fillStyle = 'rgba(255,255,255,0.07)';
        ctx.fillRect(px, py, CELL, CELL);
        ctx.font = `${CELL * 0.3}px serif`;
        ctx.fillText('🚀', px + CELL / 2, py + CELL * 0.4);
      }
    }
  }
}

function drawCurvedSnake(fromCell, toCell) {
  const a = cellToXY(fromCell);
  const b = cellToXY(toCell);
  const segments = 20;
  const amp = 12;

  ctx.beginPath();
  for (let i = 0; i <= segments; i++) {
    const t = i / segments;
    const x = a.x + (b.x - a.x) * t + Math.sin(t * Math.PI * 3) * amp;
    const y = a.y + (b.y - a.y) * t;
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.strokeStyle = '#FF6B6B';
  ctx.lineWidth = 4.5;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.shadowBlur = 10;
  ctx.shadowColor = '#FF6B6B88';
  ctx.stroke();
  ctx.shadowBlur = 0;

  // Head emoji
  ctx.font = '18px serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('🐍', a.x, a.y - 2);
}

function drawLadder(fromCell, toCell) {
  const a = cellToXY(fromCell);
  const b = cellToXY(toCell);
  const dx = b.x - a.x, dy = b.y - a.y;
  const len = Math.sqrt(dx * dx + dy * dy);
  const nx = -dy / len * 5, ny = dx / len * 5;

  // Two rails
  ctx.beginPath();
  ctx.moveTo(a.x + nx, a.y + ny);
  ctx.lineTo(b.x + nx, b.y + ny);
  ctx.moveTo(a.x - nx, a.y - ny);
  ctx.lineTo(b.x - nx, b.y - ny);
  ctx.strokeStyle = '#4ECDC4';
  ctx.lineWidth = 3;
  ctx.lineCap = 'round';
  ctx.shadowBlur = 8;
  ctx.shadowColor = '#4ECDC488';
  ctx.stroke();
  ctx.shadowBlur = 0;

  // Rungs
  const rungs = Math.floor(len / 25);
  for (let i = 1; i < rungs; i++) {
    const t = i / rungs;
    const rx = a.x + dx * t, ry = a.y + dy * t;
    ctx.beginPath();
    ctx.moveTo(rx + nx * 1.5, ry + ny * 1.5);
    ctx.lineTo(rx - nx * 1.5, ry - ny * 1.5);
    ctx.strokeStyle = '#4ECDC488';
    ctx.lineWidth = 2;
    ctx.stroke();
  }

  // Top emoji
  ctx.font = '16px serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('🪜', b.x + 2, b.y - 2);
}

function drawSnakesAndLadders() {
  Object.entries(LADDERS).forEach(([from, to]) => drawLadder(+from, +to));
  Object.entries(SNAKES).forEach(([from, to]) => drawCurvedSnake(+from, +to));
}

function drawPlayers() {
  // Draw both players
  players.forEach((p, i) => {
    if (p.pos <= 0) return;
    const { x, y } = cellToXY(p.pos);
    const offsetX = i === 0 ? -10 : 10;

    // Glow
    ctx.beginPath();
    ctx.arc(x + offsetX, y, 15, 0, Math.PI * 2);
    ctx.fillStyle = p.color + '33';
    ctx.fill();

    // Main circle
    ctx.beginPath();
    ctx.arc(x + offsetX, y, 12, 0, Math.PI * 2);
    ctx.fillStyle = p.color;
    ctx.fill();
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Player number
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 10px Segoe UI';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(i + 1, x + offsetX, y);

    // Active indicator
    if (i === turn && !gameOver) {
      ctx.beginPath();
      ctx.arc(x + offsetX, y, 16, 0, Math.PI * 2);
      ctx.strokeStyle = '#6EE7F7';
      ctx.lineWidth = 2;
      ctx.setLineDash([3, 3]);
      ctx.stroke();
      ctx.setLineDash([]);
    }
  });
}

function render() {
  ctx.clearRect(0, 0, SIZE, SIZE);
  drawBoard();
  drawSnakesAndLadders();
  drawPlayers();
}

function log(msg) {
  const el = document.getElementById('log');
  const d = document.createElement('div');
  d.textContent = msg;
  el.prepend(d);
  if (el.children.length > 50) el.removeChild(el.lastChild);
}

function updateUI() {
  const posLabel = pos => pos === 0 ? 'Start' : pos === 100 ? 'FINISHED! 🏆' : `Square ${pos}`;
  document.getElementById('p1pos').textContent = `Position: ${posLabel(players[0].pos)}`;
  document.getElementById('p2pos').textContent = `Position: ${posLabel(players[1].pos)}`;
  document.getElementById('turnBadge').textContent = gameOver ? '🏆 Game Over!' : `🎲 ${players[turn].name}'s Turn`;
  document.getElementById('playerCard0').className = `player ${turn === 0 && !gameOver ? 'active' : ''}`;
  document.getElementById('playerCard1').className = `player ${turn === 1 && !gameOver ? 'active' : ''}`;
}

async function animateMove(playerIdx, fromPos, toPos) {
  const p = players[playerIdx];
  const step = fromPos < toPos ? 1 : -1;
  for (let pos = fromPos + step; pos !== toPos + step; pos += step) {
    p.pos = Math.max(0, Math.min(100, pos));
    render();
    await new Promise(r => setTimeout(r, 80));
  }
}

async function rollDice() {
  if (rolling || gameOver) return;
  rolling = true;
  document.getElementById('rollBtn').disabled = true;

  const diceEl = document.getElementById('diceDisplay');
  diceEl.classList.add('rolling');

  for (let i = 0; i < 10; i++) {
    diceEl.textContent = DICE_FACES[Math.ceil(Math.random() * 6)];
    await new Promise(r => setTimeout(r, 60));
  }

  const dice = Math.ceil(Math.random() * 6);
  diceEl.textContent = DICE_FACES[dice];
  diceEl.classList.remove('rolling');

  const p = players[turn];
  const fromPos = p.pos;
  let newPos = fromPos + dice;

  log(`${p.name} rolled ${dice}`);

  if (newPos > 100) {
    log(`⚠️ Need exact roll — stays at ${fromPos}`);
    rolling = false;
    document.getElementById('rollBtn').disabled = false;
    turn = 1 - turn;
    updateUI();
    return;
  }

  // Animate move
  await animateMove(turn, fromPos, newPos);
  p.pos = newPos;
  log(`→ moved to square ${newPos}`);

  // Check snake
  if (SNAKES[p.pos]) {
    const to = SNAKES[p.pos];
    await new Promise(r => setTimeout(r, 300));
    log(`🐍 Snake! Slid down ${p.pos} → ${to}`);
    await animateMove(turn, p.pos, to);
    p.pos = to;
  }
  // Check ladder
  else if (LADDERS[p.pos]) {
    const to = LADDERS[p.pos];
    await new Promise(r => setTimeout(r, 300));
    log(`🪜 Ladder! Climbed up ${p.pos} → ${to}`);
    await animateMove(turn, p.pos, to);
    p.pos = to;
  }

  render();
  updateUI();

  if (p.pos === 100) {
    gameOver = true;
    log(`🏆 ${p.name} wins the game!`);
    document.getElementById('winnerText').textContent = `${p.name} Wins! 🎉`;
    setTimeout(() => document.getElementById('winnerModal').classList.add('show'), 600);
    rolling = false;
    return;
  }

  turn = 1 - turn;
  updateUI();
  rolling = false;
  document.getElementById('rollBtn').disabled = false;
}

function resetGame() {
  players[0].pos = 0;
  players[1].pos = 0;
  turn = 0;
  rolling = false;
  gameOver = false;
  document.getElementById('log').innerHTML = '';
  document.getElementById('diceDisplay').textContent = '🎲';
  document.getElementById('rollBtn').disabled = false;
  document.getElementById('winnerModal').classList.remove('show');
  render();
  updateUI();
  log('🎮 New game started — Player 1 goes first!');
}

// Keyboard support
document.addEventListener('keydown', e => {
  if (e.code === 'Space') { e.preventDefault(); rollDice(); }
  if (e.code === 'KeyR') resetGame();
});

render();
updateUI();
log('🎮 Game started — Player 1 goes first! (Space = roll)');
</script>
</body>
</html>
